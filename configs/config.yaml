server:
  http_addr: ":8080"

agent:
  default_persona: "default"
  default_provider: "openai"
  default_model: "gpt-5.4-mini"

providers:
  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-5.4-mini"
    timeout_seconds: 120

  anthropic:
    enabled: true
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    base_url: "${ANTHROPIC_BASE_URL}"
    model: "claude-sonnet-4-5"
    timeout_seconds: 120

memory:
  max_context_tokens: 131072
  response_reserved_tokens: 16384
  safety_buffer_tokens: 8192
  recent_turns_reserved_tokens: 24576
  summary_reserved_tokens: 32768
  retrieved_reserved_tokens: 32768
  compression_threshold: 0.80
  keep_recent_turns: 8

storage:
  session_store: "memory"
  summary_store: "memory"
  retrieval_store: "memory"
